- name: mongodb configure
  hosts: mongodb
  become: yes
  tasks:
  - name: copy mongodb repo file
    ansible.builtin.copy:
      src: mongodb.repo
      dest: /etc/yum.repos.d/mongodb.repo

  - name: install mongodb server
    ansible.builtin.dnf:
      name: mongodb-org
      state: present    

  - name: start and enable mongodb server
    ansible.builtin.service:
      name: mongod
      state: started
      enabled: yes    

  - name: replace content file
    ansible.builtin.replace:
      path: /etc/mongod.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'

  - name: restart mongodb server
    ansible.builtin.service:
      name: mongod
      state: restarted    
