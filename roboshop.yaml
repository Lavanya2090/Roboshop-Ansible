- name: create ec2 and route53 records
  hosts: localhost
  connection: local
  vars:
    sg_ID: sg-057298e491bdfde23
    AMI_ID: ami-0cca150d127c2216f
    domain_name: Lavanya2090
    env: dev
    instances:
      - mongodb
      - catalogue
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      instance_type: t3.micro
      security_group: "{{ sg_ID }}"
      image_id: "{{ AMI_ID }}"
      name: "{{ item }} - {{ env }}"
      tags:
        project: roboshop
        component: "{{ item }}"
        Environment: "{{ env }}"
        name: "{{ item }} - {{ env }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print ec2 output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"

  - name: create route53 record
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "roboshop-{{ env }}.{{ domain_name }}" # mongodb-dev.Lavanya2090, frontend-dev.Lavanya2090
      type: A
      ttl: 60
      value: "{{ item.instances[0].public_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"
    when: item.item == "frontend"